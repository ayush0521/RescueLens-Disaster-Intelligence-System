<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RescueLens</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🚨 RescueLens</h1>
    <p>Real-Time Disaster Monitoring</p>
  </header>

  <main>

    <!-- LIVE STATS -->
    <section class="stats">
      <div>Alerts: <span id="alert-count">0</span></div>
      <div>Cities: <span id="city-count">0</span></div>
      <div>High Risk: <span id="high-risk">0</span></div>
    </section>

    <!-- ALERTS -->
    <section>
      <h2>🚨 Alerts</h2>
      <div id="alerts-container">
        Loading alerts...
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
